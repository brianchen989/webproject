{% extends "base.html" %}

{% block head %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='css/網2.0.css') }}">
<style>
    .goal-page {
        display: flex;
        flex-direction: column;
        gap: 30px;
        padding: 40px;
        max-width: 1200px;
        margin: 0 auto;
        min-height: 80vh;
    }
    
    /* 上方的 block：左右排版 */
    .block-top {
        display: flex;
        flex-wrap: wrap;
        gap: 40px;
        align-items: flex-start;
        background: #fdfdfd;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    
    .block-top-left {
        flex: 1;
        min-width: 250px;
        display: flex;
        justify-content: center;
    }
    
    .block-top-left img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    
    .block-top-right {
        flex: 2;
        min-width: 300px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    
    .block-top-right h1 {
        color: #2c3e50;
        margin: 0;
        font-size: 2.2rem;
        border-bottom: 3px solid #4a7c59;
        padding-bottom: 10px;
        display: inline-block;
        width: fit-content;
    }
    
    .block-top-right h3 {
        color: #e67e22;
        margin: 0;
        font-size: 1.3rem;
        font-weight: 600;
    }
    
    .block-top-right p {
        font-size: 1.15rem;
        color: #444;
        line-height: 1.8;
        margin: 0;
        text-align: justify;
    }
    
    /* 中間的 block：遊戲預留區 */
    .block-middle {
        background: #eef5ff;
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        min-height: 300px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border: 2px dashed #a0c4ff;
    }
    
    .block-middle h2 {
        color: #4a7c59;
        margin-bottom: 15px;
    }
    
    /* 下方的 block：預留區 */
    .block-bottom {
        background: #f5f5f5;
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        min-height: 200px;
        border: 2px dashed #ccc;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .back-btn {
        display: inline-block;
        margin-top: 30px;
        padding: 12px 25px;
        background-color: #333;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        transition: background-color 0.3s;
        text-align: center;
        align-self: center;
        width: fit-content;
    }
    
    .back-btn:hover {
        background-color: #555;
    }
</style>
{% endblock %}

{% block content %}
<div class="goal-page">
    
    <!-- 上方 Block：圖片與介紹 -->
    <div class="block-top">
        <div class="block-top-left">
            <img src="{{ url_for('static', filename='image/E-WEB-Goal-09.png') }}" alt="目標 9">
        </div>
        <div class="block-top-right">
            <h1>目標 9：工業化、創新及基礎建設</h1>
            <h3>簡介：建立具有韌性的基礎建設，促進包容且永續的工業，並加速創新。</h3>
            <p>穩固的基礎建設與具包容性的工業化是經濟發展的基石。此目標鼓勵技術創新與升級，提升基礎建設的韌性，並促進中小型企業的發展。</p>
        </div>
    </div>
    
    <!-- 中間 Block：遊戲區塊 -->
    <div class="block-middle">
        <h2>🎮 與此目標相關的小遊戲</h2>
        <p>（此處為目標 9 相關小遊戲的預留空間）</p>
    </div>
    
    <!-- 下方 Block：預留區塊 -->
    <div class="block-bottom">
        <p>（下方區塊：未來可以新增更多與此目標相關的內容或資訊）</p>
    </div>
    
    <a href="{{ url_for('index') }}" class="back-btn">返回首頁</a>
</div>
{% endblock %}
